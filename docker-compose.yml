version: '3.8'
services:
  postgres:
    image: postgres:15-alpine
    container_name: quickwerewolf-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: werewolf
      POSTGRES_PASSWORD: werewolfpassword
      POSTGRES_DB: quickwerewolf
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: quickwerewolf-redis
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    restart: unless-stopped

volumes:
  pgdata:
  redisdata:

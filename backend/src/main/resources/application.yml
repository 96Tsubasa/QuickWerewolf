spring:
  application:
    name: QuickWerewolf

  datasource:
    url: jdbc:postgresql://localhost:5432/quickwerewolf
    username: werewolf
    password: werewolfpassword
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  data:
    redis:
      host: localhost
      port: 6379

server:
  port: 8080

logging:
  level:
    org.springframework.web.socket: DEBUG
